name: Byg og udgiv OpenSAK

# Kører kun ved versions-tags fx v1.0.0
# Lav release: git tag v1.0.0 && git push origin v1.0.0
# Manuel start: GitHub → Actions → Run workflow

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ============================================================
  # Windows .exe
  # ============================================================
  byg-windows:
    name: "Byg Windows .exe"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest pytest-cov
      - name: Kør tests
        run: pytest tests/ -v --tb=short
      - name: Byg .exe
        run: pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src
      - name: Pak ZIP
        shell: powershell
        run: Compress-Archive -Path dist/OpenSAK -DestinationPath dist/OpenSAK-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-Windows
          path: dist/OpenSAK-Windows.zip
          retention-days: 7

  # ============================================================
  # Linux AppImage
  # ============================================================
  byg-linux:
    name: "Byg Linux AppImage"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Installer system-packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libglib2.0-0 libegl1 libgl1-mesa-dev libdbus-1-3 xvfb libfuse2 imagemagick
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest pytest-cov
      - name: Kør tests
        run: xvfb-run -a pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
      - name: Byg Linux binær
        run: xvfb-run -a pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src
      - name: Hent appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
      - name: Byg AppDir
        run: python3 scripts/make_appdir.py
      - name: Byg AppImage
        run: ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir OpenSAK-Linux-x86_64.AppImage
        env:
          ARCH: x86_64
      - name: Tjek output og lav fallback tar.gz
        run: |
          if [ -f OpenSAK-Linux-x86_64.AppImage ]; then
            echo AppImage OK
            ls -lh OpenSAK-Linux-x86_64.AppImage
            chmod +x OpenSAK-Linux-x86_64.AppImage
          else
            echo AppImage fejlede - laver tar.gz fallback
            tar -czf OpenSAK-Linux-x86_64.tar.gz -C dist OpenSAK/
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-Linux
          path: |
            OpenSAK-Linux-x86_64.AppImage
            OpenSAK-Linux-x86_64.tar.gz
          retention-days: 7

  # ============================================================
  # macOS .dmg
  # ============================================================
  byg-macos:
    name: "Byg macOS .dmg"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest pytest-cov
      - name: Kør tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
        continue-on-error: true
      - name: Byg macOS .app
        run: pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src
      - name: Lav .dmg
        run: |
          brew install create-dmg
          create-dmg --volname OpenSAK --window-size 500 300 --icon-size 100 --app-drop-link 350 150 OpenSAK-macOS.dmg dist/OpenSAK.app || (cd dist && zip -r ../OpenSAK-macOS.zip OpenSAK.app)
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-macOS
          path: |
            OpenSAK-macOS.dmg
            OpenSAK-macOS.zip
          retention-days: 7

  # ============================================================
  # Opret GitHub Release
  # ============================================================
  opret-release:
    name: "Opret GitHub Release"
    runs-on: ubuntu-latest
    needs: [byg-windows, byg-linux, byg-macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: OpenSAK-Windows
          path: release-files/
      - uses: actions/download-artifact@v4
        with:
          name: OpenSAK-Linux
          path: release-files/
      - uses: actions/download-artifact@v4
        with:
          name: OpenSAK-macOS
          path: release-files/
      - name: Vis release-filer
        run: ls -lh release-files/
      - name: Udtræk version fra tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Opret GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "OpenSAK ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body: |
            ## OpenSAK ${{ steps.version.outputs.VERSION }}

            ### Download

            | Platform | File | How to use |
            |----------|------|------------|
            | 🪟 Windows | `OpenSAK-Windows.zip` | Unzip and double-click `OpenSAK.exe` |
            | 🐧 Linux | `OpenSAK-Linux-x86_64.AppImage` | See instructions below |
            | 🍎 macOS | `OpenSAK-macOS.dmg` | Open and drag OpenSAK to Applications |

            ### Linux

            ```bash
            chmod +x OpenSAK-Linux-x86_64.AppImage
            ./OpenSAK-Linux-x86_64.AppImage
            ```

            Or simply right-click the file → Properties → Allow executing as program, then double-click.

            ### Windows

            1. Download `OpenSAK-Windows.zip`
            2. Right-click → Extract All
            3. Open the extracted folder and double-click `OpenSAK.exe`

            ### macOS

            1. Download `OpenSAK-macOS.dmg`
            2. Open the file and drag OpenSAK to your Applications folder
            3. First launch: right-click → Open (required because the app is not signed with an Apple certificate)

            ---
            See [CHANGELOG.md](https://github.com/AgreeDK/OpenSAK/blob/main/CHANGELOG.md) for details.
          files: release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
