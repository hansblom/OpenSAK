name: Byg og udgiv OpenSAK

# ----------------------------------------------------------------
# Hvornår kører dette?
# Kun når du pusher et versions-tag som fx v1.0.0
#
# Sådan laver du en release:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Du kan også starte det manuelt under Actions → "Run workflow"
# ----------------------------------------------------------------
on:
  push:
    tags:
      - "v*"          # v1.0.0, v1.2.3, v2.0.0-beta osv.
  workflow_dispatch:  # Tillad manuel start fra GitHub UI

# ----------------------------------------------------------------
# Miljøvariable tilgængelige i alle jobs
# ----------------------------------------------------------------
env:
  APP_NAME: OpenSAK
  PYTHON_VERSION: "3.11"

# ================================================================
# JOBS — tre byggemaskiner kører parallelt
# ================================================================
jobs:

  # ==============================================================
  # JOB 1: Byg Windows .exe
  # ==============================================================
  byg-windows:
    name: 🪟 Byg Windows .exe
    runs-on: windows-latest

    steps:
      - name: Hent kildekode
        uses: actions/checkout@v4

      - name: Installer Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Kør tests inden build
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short
        continue-on-error: false   # Afbryd build hvis tests fejler

      - name: Byg Windows .exe med PyInstaller
        run: |
          pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src

      - name: Pak dist-mappen ind i ZIP
        run: |
          cd dist
          Compress-Archive -Path OpenSAK -DestinationPath OpenSAK-Windows.zip
        shell: powershell

      - name: Gem Windows build som artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-Windows
          path: dist/OpenSAK-Windows.zip
          retention-days: 7

  # ==============================================================
  # JOB 2: Byg Linux AppImage
  # ==============================================================
  byg-linux:
    name: 🐧 Byg Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Hent kildekode
        uses: actions/checkout@v4

      - name: Installer system-packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libglib2.0-0 \
            libegl1 \
            libgl1-mesa-dev \
            libdbus-1-3 \
            xvfb \
            fuse \
            libfuse2

      - name: Installer Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Kør tests (med virtuel skærm)
        run: |
          pip install pytest pytest-cov
          xvfb-run -a pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
        continue-on-error: false

      - name: Byg Linux binær med PyInstaller
        run: |
          xvfb-run -a pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src

      - name: Hent AppImage builder
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

      - name: Lav AppDir struktur
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Kopiér den byggede binær
          cp -r dist/OpenSAK/* AppDir/usr/bin/

          # Lav .desktop fil
          cat > AppDir/opensak.desktop << 'EOF'
          [Desktop Entry]
          Name=OpenSAK
          Comment=Open Source geocaching styringsværktøj
          Exec=OpenSAK
          Icon=opensak
          Type=Application
          Categories=Utility;GPS;
          Terminal=false
          EOF

          cp AppDir/opensak.desktop AppDir/usr/share/applications/

          # Lav et simpelt SVG ikon (erstattes med rigtigt ikon senere)
          cat > AppDir/usr/share/icons/hicolor/256x256/apps/opensak.png << 'EOF'
          EOF
          # Brug AppImage standard ikon hvis vi ikke har et eget endnu
          cp AppDir/opensak.desktop AppDir/AppRun || true

          # AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/OpenSAK" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Byg AppImage
        run: |
          ARCH=x86_64 ./appimagetool AppDir OpenSAK-Linux-x86_64.AppImage
        continue-on-error: true   # AppImage er bonus — fejl her stopper ikke releasen

      - name: Pak dist som fallback ZIP (hvis AppImage fejler)
        run: |
          cd dist
          tar -czf OpenSAK-Linux.tar.gz OpenSAK/
          mv OpenSAK-Linux.tar.gz ../ || true

      - name: Gem Linux build som artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-Linux
          path: |
            OpenSAK-Linux-x86_64.AppImage
            OpenSAK-Linux.tar.gz
          retention-days: 7

  # ==============================================================
  # JOB 3: Byg macOS .app
  # ==============================================================
  byg-macos:
    name: 🍎 Byg macOS .dmg
    runs-on: macos-latest

    steps:
      - name: Hent kildekode
        uses: actions/checkout@v4

      - name: Installer Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Kør tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
        continue-on-error: true   # macOS ikke fuldt testet endnu

      - name: Byg macOS .app med PyInstaller
        run: |
          pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src

      - name: Lav .dmg installer
        run: |
          # Installer create-dmg værktøj
          brew install create-dmg || pip install dmgbuild

          # Lav DMG med create-dmg
          create-dmg \
            --volname "OpenSAK" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 350 150 \
            "OpenSAK-macOS.dmg" \
            "dist/OpenSAK.app" \
          || \
          # Fallback: simpel ZIP hvis create-dmg fejler
          (cd dist && zip -r ../OpenSAK-macOS.zip OpenSAK.app)
        continue-on-error: true

      - name: Gem macOS build som artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-macOS
          path: |
            OpenSAK-macOS.dmg
            OpenSAK-macOS.zip
          retention-days: 7

  # ==============================================================
  # JOB 4: Opret GitHub Release og upload alle filer
  # Kører kun når alle tre builds er færdige
  # ==============================================================
  opret-release:
    name: 📦 Opret GitHub Release
    runs-on: ubuntu-latest
    needs: [byg-windows, byg-linux, byg-macos]   # Venter på alle tre
    if: startsWith(github.ref, 'refs/tags/')       # Kun ved tags, ikke workflow_dispatch

    permissions:
      contents: write    # Nødvendigt for at oprette releases

    steps:
      - name: Hent kildekode (til changelog)
        uses: actions/checkout@v4

      - name: Hent Windows build
        uses: actions/download-artifact@v4
        with:
          name: OpenSAK-Windows
          path: release-files/

      - name: Hent Linux build
        uses: actions/download-artifact@v4
        with:
          name: OpenSAK-Linux
          path: release-files/

      - name: Hent macOS build
        uses: actions/download-artifact@v4
        with:
          name: OpenSAK-macOS
          path: release-files/

      - name: Vis hvad der er i release-files
        run: ls -la release-files/

      - name: Udtræk versionsnummer fra tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Opret GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "OpenSAK ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body: |
            ## OpenSAK ${{ steps.version.outputs.VERSION }}

            ### Download

            | Platform | Fil | Bemærkning |
            |----------|-----|------------|
            | 🪟 Windows | `OpenSAK-Windows.zip` | Pak ud og kør `OpenSAK.exe` |
            | 🐧 Linux | `OpenSAK-Linux-x86_64.AppImage` | Giv køretilladelse: `chmod +x` derefter dobbeltklik |
            | 🍎 macOS | `OpenSAK-macOS.dmg` | Åbn og træk til Applications |

            ### Installation

            **Windows:** Download ZIP → pak ud → dobbeltklik `OpenSAK.exe`

            **Linux:**
            ```bash
            chmod +x OpenSAK-Linux-x86_64.AppImage
            ./OpenSAK-Linux-x86_64.AppImage
            ```

            **macOS:** Download DMG → åbn → træk OpenSAK til Applications → højreklik → Åbn første gang

            ---
            Se [CHANGELOG.md](https://github.com/AgreeDK/OpenSAK/blob/main/CHANGELOG.md) for detaljer om denne version.

          files: |
            release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
