name: Byg og udgiv OpenSAK

# Kører kun ved versions-tags fx v1.0.0
# Lav release: git tag v1.0.0 && git push origin v1.0.0
# Manuel start: GitHub → Actions → Run workflow

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ============================================================
  # Windows .exe
  # ============================================================
  byg-windows:
    name: "Byg Windows .exe"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest pytest-cov
      - name: Kør tests
        run: pytest tests/ -v --tb=short
      - name: Byg .exe
        run: pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src
      - name: Pak ZIP
        shell: powershell
        run: Compress-Archive -Path dist/OpenSAK -DestinationPath dist/OpenSAK-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-Windows
          path: dist/OpenSAK-Windows.zip
          retention-days: 7

  # ============================================================
  # Linux AppImage
  # ============================================================
  byg-linux:
    name: "Byg Linux AppImage"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Installer system-packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libglib2.0-0 libegl1 libgl1-mesa-dev libdbus-1-3 xvfb libfuse2 imagemagick
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest pytest-cov
      - name: Kør tests
        run: xvfb-run -a pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
      - name: Byg Linux binær
        run: xvfb-run -a pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src
      - name: Hent appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
      - name: Byg AppDir
        run: python3 scripts/make_appdir.py
      - name: Byg AppImage
        run: ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir OpenSAK-Linux-x86_64.AppImage
        env:
          ARCH: x86_64
      - name: Tjek output og lav fallback tar.gz
        run: |
          if [ -f OpenSAK-Linux-x86_64.AppImage ]; then
            echo AppImage OK
            ls -lh OpenSAK-Linux-x86_64.AppImage
            chmod +x OpenSAK-Linux-x86_64.AppImage
          else
            echo AppImage fejlede - laver tar.gz fallback
            tar -czf OpenSAK-Linux-x86_64.tar.gz -C dist OpenSAK/
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-Linux
          path: |
            OpenSAK-Linux-x86_64.AppImage
            OpenSAK-Linux-x86_64.tar.gz
          retention-days: 7

  # ============================================================
  # macOS arm64 (Apple Silicon)
  # ============================================================
  byg-macos-arm64:
    name: "Byg macOS arm64 (Apple Silicon)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest pytest-cov
      - name: Kør tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
        continue-on-error: true
      - name: Byg macOS .app (arm64)
        run: pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src
      - name: Upload arm64 build
        uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-macOS-arm64
          path: dist/OpenSAK.app
          retention-days: 1

  # ============================================================
  # macOS x86_64 (Intel)
  # ============================================================
  byg-macos-x86:
    name: "Byg macOS x86_64 (Intel)"
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest pytest-cov
      - name: Kør tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
        continue-on-error: true
      - name: Byg macOS .app (x86_64)
        run: pyinstaller opensak.spec --clean --noconfirm
        env:
          PYTHONPATH: src
      - name: Upload x86_64 build
        uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-macOS-x86_64
          path: dist/OpenSAK.app
          retention-days: 1

  # ============================================================
  # macOS Universal Binary — kombiner arm64 + x86_64
  # ============================================================
  byg-macos-universal:
    name: "Byg macOS Universal .dmg"
    runs-on: macos-latest
    needs: [byg-macos-arm64, byg-macos-x86]
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 build
        uses: actions/download-artifact@v4
        with:
          name: OpenSAK-macOS-arm64
          path: builds/arm64/OpenSAK.app

      - name: Download x86_64 build
        uses: actions/download-artifact@v4
        with:
          name: OpenSAK-macOS-x86_64
          path: builds/x86_64/OpenSAK.app

      - name: Lav Universal Binary med lipo
        run: |
          set -e

          ARM_APP="builds/arm64/OpenSAK.app"
          X86_APP="builds/x86_64/OpenSAK.app"
          UNI_APP="dist/OpenSAK.app"

          mkdir -p dist

          # Kopiér arm64 .app som udgangspunkt (bevarer struktur, Info.plist, ikoner osv.)
          cp -R "$ARM_APP" "$UNI_APP"

          # Gennemgå alle filer i arm64 buildet
          find "$ARM_APP" -type f | while read arm_file; do
            rel="${arm_file#$ARM_APP/}"
            x86_file="$X86_APP/$rel"
            uni_file="$UNI_APP/$rel"

            # Kombiner kun filer der eksisterer i begge builds og er Mach-O
            if [ -f "$x86_file" ] && lipo -info "$arm_file" &>/dev/null 2>&1; then
              lipo -create "$arm_file" "$x86_file" -output "$uni_file" 2>/dev/null || true
            fi
          done

          # Verificér den kombinerede binær
          echo "=== Universal Binary verificering ==="
          lipo -info "$UNI_APP/Contents/MacOS/OpenSAK" || echo "Kunne ikke verificere - fortsætter alligevel"
          echo "=== Arkitektur detaljer ==="
          file "$UNI_APP/Contents/MacOS/OpenSAK" || true

      - name: Lav .dmg
        run: |
          brew install create-dmg
          create-dmg \
            --volname "OpenSAK" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 350 150 \
            OpenSAK-macOS-Universal.dmg \
            dist/OpenSAK.app \
          || (cd dist && zip -r ../OpenSAK-macOS-Universal.zip OpenSAK.app && echo "Fallback ZIP lavet")

      - name: Tjek output
        run: |
          echo "=== Producerede filer ==="
          ls -lh OpenSAK-macOS-Universal.dmg OpenSAK-macOS-Universal.zip 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: OpenSAK-macOS
          path: |
            OpenSAK-macOS-Universal.dmg
            OpenSAK-macOS-Universal.zip
          retention-days: 7

  # ============================================================
  # Opret GitHub Release
  # ============================================================
  opret-release:
    name: "Opret GitHub Release"
    runs-on: ubuntu-latest
    needs: [byg-windows, byg-linux, byg-macos-universal]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: OpenSAK-Windows
          path: release-files/
      - uses: actions/download-artifact@v4
        with:
          name: OpenSAK-Linux
          path: release-files/
      - uses: actions/download-artifact@v4
        with:
          name: OpenSAK-macOS
          path: release-files/
      - name: Vis release-filer
        run: ls -lh release-files/
      - name: Udtræk version fra tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Opret GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "OpenSAK ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body: |
            ## OpenSAK ${{ steps.version.outputs.VERSION }}

            ### Download

            | Platform | Fil | Anvendelse |
            |----------|-----|------------|
            | 🪟 Windows | `OpenSAK-Windows.zip` | Udpak og dobbeltklik på `OpenSAK.exe` |
            | 🐧 Linux | `OpenSAK-Linux-x86_64.AppImage` | Se instruktioner nedenfor |
            | 🍎 macOS | `OpenSAK-macOS-Universal.dmg` | Åbn og træk OpenSAK til Programmer — virker på **både Intel og Apple Silicon** |

            ### Linux

            ```bash
            chmod +x OpenSAK-Linux-x86_64.AppImage
            ./OpenSAK-Linux-x86_64.AppImage
            ```

            Eller højreklik → Egenskaber → Tillad kørsel som program, og dobbeltklik derefter.

            ### Windows

            1. Download `OpenSAK-Windows.zip`
            2. Højreklik → Udpak alle
            3. Åbn den udpakkede mappe og dobbeltklik på `OpenSAK.exe`

            ### macOS

            1. Download `OpenSAK-macOS-Universal.dmg`
            2. Åbn filen og træk OpenSAK til mappen Programmer
            3. Første gang: højreklik → Åbn (krævet da appen ikke er signeret med Apple-certifikat)

            ---
            Se [CHANGELOG.md](https://github.com/AgreeDK/OpenSAK/blob/main/CHANGELOG.md) for detaljer.
          files: release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
