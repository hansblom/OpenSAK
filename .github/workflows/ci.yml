name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: src
  QT_QPA_PLATFORM: xcb
  QT_QPA_PLATFORM_PLUGIN_PATH: /usr/lib/x86_64-linux-gnu/qt6/plugins
  QT_QUICK_BACKEND: software
  QT_OPENGL: software

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          # Essential for GUI testing in CI
          pip install pytest pytest-qt pytest-xvfb 

      - name: Install Qt dependencies
        run: |
          sudo apt-get update
          # Using corrected package names for Ubuntu 22.04/24.04
          sudo apt-get install -y \
            libegl1 \
            libgl1-mesa-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            xvfb

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          source .venv/bin/activate
          xvfb-run -a pytest -v tests